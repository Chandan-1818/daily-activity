name: Daily 10 Commits

on:
  schedule:
    # Runs every hour
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check Commit Time
        id: check_time
        run: |
          HOUR=$(TZ=Asia/Kolkata date +%H)
          echo "Current hour in IST: $HOUR"

          case "$HOUR" in
            00|02|04|07|09|12|15|18|20|22)
              echo "should_commit=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "should_commit=false" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Update File
        if: steps.check_time.outputs.should_commit == 'true'
        run: |
          echo "Commit made at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')" >> last-updated.txt

      - name: Commit and Push Changes
        if: steps.check_time.outputs.should_commit == 'true'
        run: |
          git add last-updated.txt
          
          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto commit - $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
            git push
          else
            echo "No changes to commit."
          fi
