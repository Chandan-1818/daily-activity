name: Hourly Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Timestamp
        run: |
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > LAST_UPDATED

      - name: Commit Changes
        run: |
          git config --global user.name "Chandan-1818"
          git config --global user.email "chandan895121@gmail.com"

          git add LAST_UPDATED

          messages=(
            "chore(bot): 🤖 auto commit"
            "chore(bot): 🚀 hourly update"
            "chore(bot): ✨ scheduled commit"
            "chore(bot): 🔄 repository update"
            "chore(bot): 📅 hourly sync"
            "chore(bot): 📝 update timestamp"
            "chore(bot): ⚡ maintenance"
            "chore(bot): 🌟 keep active"
            "chore(bot): 🎯 automated update"
            "chore(bot): ✅ hourly commit"
          )

          random_index=$((RANDOM % ${#messages[@]}))
          git commit -m "${messages[$random_index]}" || echo "No changes to commit"

      - name: Push Changes
        run: |
          git push
